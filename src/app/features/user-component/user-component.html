
<div class="info-title">
  <div>
    <h2>User Management</h2>
    <span>Manage your team member and their account permisions here</span>
  </div>
</div>
<div class="table_users" *ngIf="facade.vm$ | async as vm">
  <div class="filter">
    <div class="search">
      <span class="p-input-icon-left">
        <i class="pi pi-search"></i>
        <input
          type="text"
          pInputText
          placeholder="Search users"
          [(ngModel)]="searchTerm"
        />
      </span>
    </div>
    <div class="btn-filters">
      <p-button
        label="Export"
        icon="pi pi-download"
        (click)="null"
      ></p-button>
    </div>

  </div>

    <div class="table_users__content" >
      <app-table-users
        [filterText]="searchTerm"
        [users]="vm.users"
        [header]="vm.headers"
      ></app-table-users>
    </div>
</div>
